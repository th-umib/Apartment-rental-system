<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartApart | Admin</title>
  <link rel="icon" href="./assets/favicon.png?v=3" type="image/png" />
  <link rel="shortcut icon" href="./assets/favicon.png?v=3" type="image/png" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <!-- Top message box -->
  <div id="top-message-box" class="top-message-box"></div>

  <header class="site-header">
    <a href="index.html" class="site-brand">
      <div class="site-brand-box">🏢</div>
      <span class="site-brand-text">SmartApart Admin</span>
    </a>

    <nav class="site-nav">
      <a href="index.html" class="site-nav-btn">Home</a>
      <a href="apartments.html" class="site-nav-btn">Apartments</a>
      <a href="bookings.html" class="site-nav-btn">Bookings</a>
      <a href="inquiries.html" class="site-nav-btn">Inquiries</a>
      <a href="admin.html" class="site-nav-btn active">Admin</a>
    </nav>
  </header>

  <main class="admin-page">
    <section class="admin-hero">
      <h1>Admin Dashboard</h1>
      <p>Manage apartments, update listings, and control your rental system easily.</p>
    </section>

    <section class="admin-stats">
      <div class="stat-card">
        <h3>Total Apartments</h3>
        <p id="total-apartments">0</p>
      </div>
    </section>

    <section class="admin-section" id="apartments-section">
      <h2>Manage Apartments</h2>

      <form id="apartment-form" class="admin-form">
        <input type="hidden" id="apartment-id" />

        <div class="form-group">
          <label for="title">Apartment Title</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="Enter apartment title"
            required
          />
        </div>

        <div class="form-group">
          <label for="city">City</label>
          <input
            type="text"
            id="city"
            name="city"
            placeholder="Enter city"
            required
          />
        </div>

        <div class="form-group">
          <label for="address">Address</label>
          <input
            type="text"
            id="address"
            name="address"
            placeholder="Enter apartment address"
            required
          />
        </div>

        <div class="form-group">
          <label for="price">Price (€)</label>
          <input
            type="number"
            id="price"
            name="price"
            placeholder="Enter apartment price"
            required
          />
        </div>

        <button type="submit" id="save-apartment-btn" class="primary-btn">
          Add Apartment
        </button>
      </form>

      <div class="admin-list-wrapper">
        <h3>Apartment List</h3>
        <div id="admin-apartments-list" class="admin-list">
          <p>No apartments loaded yet.</p>
        </div>
      </div>
    </section>
  </main>
  <script src="./js/admin.js"></script>
</body>
</html>
