<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartApart | Admin</title>
  <link rel="icon" href="./assets/favicon.png?v=3" type="image/png" />
  <link rel="shortcut icon" href="./assets/favicon.png?v=3" type="image/png" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="site-brand">
      <div class="site-brand-box">🏢</div>
      <span class="site-brand-text">SmartApart Admin</span>
    </a>

    <nav class="site-nav">
      <a href="index.html" class="site-nav-btn">Home</a>
      <a href="apartments.html" class="site-nav-btn">Apartments</a>
      <a href="bookings.html" class="site-nav-btn">Bookings</a>
      <a href="inquiries.html" class="site-nav-btn">Inquiries</a>
      <a href="admin.html" class="site-nav-btn active">Admin</a>
    </nav>
  </header>

  <main class="admin-page" style="padding: 24px; max-width: 1200px; margin: 0 auto;">
    <section class="admin-hero" style="margin-bottom: 30px;">
      <h1 style="margin-bottom: 8px;">Admin Dashboard</h1>
      <p style="margin: 0; color: #555;">
        Manage apartments and review the main system data from one place.
      </p>
    </section>

    <section class="admin-summary" style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px;">
      <div class="admin-card" style="padding: 18px; border: 1px solid #ddd; border-radius: 12px; min-width: 220px; background: #fff;">
        <h3 style="margin-top: 0;">Total Apartments</h3>
        <p id="total-apartments" style="font-size: 28px; font-weight: bold; margin-bottom: 0;">0</p>
      </div>
    </section>

    <section class="admin-form-section" style="margin-bottom: 40px;">
      <h2 style="margin-bottom: 16px;">Add New Apartment</h2>

      <form id="apartment-form" style="display: grid; gap: 14px; max-width: 700px;">
        <input
          type="text"
          id="title"
          name="title"
          placeholder="Apartment title"
          required
          style="padding: 12px; border: 1px solid #ccc; border-radius: 8px;"
        />

        <textarea
          id="description"
          name="description"
          placeholder="Description"
          required
          style="padding: 12px; border: 1px solid #ccc; border-radius: 8px; min-height: 100px;"
        ></textarea>

        <input
          type="text"
          id="city"
          name="city"
          placeholder="City"
          required
          style="padding: 12px; border: 1px solid #ccc; border-radius: 8px;"
        />

        <input
          type="text"
          id="address"
          name="address"
          placeholder="Address"
          required
          style="padding: 12px; border: 1px solid #ccc; border-radius: 8px;"
        />

        <input
          type="number"
          id="price_per_month"
          name="price_per_month"
          placeholder="Price per month"
          required
          style="padding: 12px; border: 1px solid #ccc; border-radius: 8px;"
        />

        <input
          type="number"
          id="bedrooms"
          name="bedrooms"
          placeholder="Bedrooms"
          required
          style="padding: 12px; border: 1px solid #ccc; border-radius: 8px;"
        />

        <input
          type="number"
          id="bathrooms"
          name="bathrooms"
          placeholder="Bathrooms"
          required
          style="padding: 12px; border: 1px solid #ccc; border-radius: 8px;"
        />

        <button
          type="submit"
          style="padding: 12px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;"
        >
          Add Apartment
        </button>
      </form>

      <p id="apartment-message" style="margin-top: 14px; font-weight: bold;"></p>
    </section>

    <section class="admin-list-section">
      <h2 style="margin-bottom: 16px;">All Apartments</h2>
      <div id="admin-apartments-list"></div>
    </section>
  </main>

  <script src="./js/admin.js"></script>
</body>
</html>
